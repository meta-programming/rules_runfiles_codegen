name: "Semantic PR"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronized

permissions:
  pull_requests: read

jobs:
  main:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          scopes: |
            core
            go
            kotlin
            engprod
          requireScope: false
