name: CI

on:
  push:
    branches: [ main, re-arch ]
  pull_request:
    branches: [ main, re-arch ]

jobs:
  test-and-check:
    name: Test and Check README
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: Set up Bazel
      uses: bazelbuild/setup-bazelisk@v3

    # We must run the integration tests FIRST to generate the bazel-bin outputs
    # that the README updater reads. Running 'bazel test' also acts as our
    # integration test suite.

    - name: Run All Tests
      run: |
        tools/devtool test

    - name: Verify Documentation is Synchronized
      run: |
        # We don't need to build because 'test' already built everything
        tools/devtool update-docs --build=false
        
        # Verify no changes were made to README or Stardoc files
        git diff --exit-code README.md go/docs/defs.md kotlin/docs/defs.md || (
          echo "=============================================================================="
          echo " ERROR: Documentation is out of sync."
          echo " Please run the following command locally and commit the changes:"
          echo "   tools/devtool update-docs"
          echo "=============================================================================="
          exit 1
        )
