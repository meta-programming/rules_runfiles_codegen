name: Release & Publish to BCR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'The tag name to publish (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  publish-bcr:
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1
    with:
      tag_name: ${{ github.event.release.tag_name || inputs.tag_name }}
      registry_fork: gonzojive/bazel-central-registry
      open_pull_request: false
      attest: true
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
