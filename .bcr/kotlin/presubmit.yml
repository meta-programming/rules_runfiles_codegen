matrix:
  platform: ["ubuntu2004", "macos", "windows"]
  bazel: ["7.x", "8.x", "9.x"]
tasks:
  verify_targets:
    name: "Verify Kotlin targets"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      - "@rules_runfile_codegen_kotlin//:defs_bzl"
      - "@rules_runfile_codegen_kotlin//runfiles:runfiles"
